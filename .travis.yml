os: linux
language: node_js
node_js:
  - "10"
  - "12"
cache:
  directories:
    - node_modules
env:
  - BUILD_REACT=true
script:
  - npm run test:ci
  - npm run test:orc-shared
after_success: npm run coveralls
deploy:
  - provider: npm
    edge: true
    email: gert.sonderby@orckestra.com
    api_token:
      secure: 
    tag: dev
    on:
      repo: Orckestra/orc-scripts
      tags: true
      condition: ( $TRAVIS_BRANCH = develop || $TRAVIS_BRANCH = feature/* ) && $TRAVIS_NODE_VERSION = 12
  - provider: npm
    edge: true
    email: gert.sonderby@orckestra.com
    api_token:
      secure: 
    tag: latest
    on:
      repo: Orckestra/orc-scripts
      tags: true
      condition: $TRAVIS_BRANCH = master && $TRAVIS_NODE_VERSION = 12
  - provider: npm
    edge: true
    email: gert.sonderby@orckestra.com
    api_token:
      secure: 
    tag: beta
    on:
      repo: Orckestra/orc-scripts
      tags: true
      condition: $TRAVIS_BRANCH = release/* && $TRAVIS_NODE_VERSION = 12
